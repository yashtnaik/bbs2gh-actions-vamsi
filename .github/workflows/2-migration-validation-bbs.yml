name: 2-migration-validation-bbs

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'Path to CSV file with repository list'
        required: true
        type: string
      bbs_base_url:
        description: 'Bitbucket Server/DC base URL, e.g. https://bitbucket.example.com'
        required: true
        type: string
  workflow_call:
    inputs:
      csv_path:
        description: 'Path to CSV file with repository list'
        required: true
        type: string
      bbs_base_url:
        description: 'Bitbucket Server/DC base URL, e.g. https://bitbucket.example.com'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  validate-migrations:
    name: Validate Migrated Repositories (BBS to GH)
    runs-on: windows-latest
    timeout-minutes: 120
    environment: PAT tokens

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        shell: pwsh
        run: |
          gh --version
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: (Optional) Install gh bbs2gh extension
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          Write-Host "Installing gh bbs2gh extension..."
          gh extension install github/gh-bbs2gh
          Write-Host "Verifying installation..."
          gh bbs2gh --help

      - name: Resolve inputs to environment
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "CSV_FILE=${{ github.event.inputs.csv_path }}" >> $env:GITHUB_ENV
            echo "BBS_BASE_URL=${{ github.event.inputs.bbs_base_url }}" >> $env:GITHUB_ENV
          }
          else {
            echo "CSV_FILE=${{ inputs.csv_path }}" >> $env:GITHUB_ENV
            echo "BBS_BASE_URL=${{ inputs.bbs_base_url }}" >> $env:GITHUB_ENV
          }

      - name: Validate Inputs
        shell: pwsh
        run: |
          if (-not $env:CSV_FILE)     { throw "csv_path is required" }
          if (-not $env:BBS_BASE_URL) { throw "bbs_base_url is required" }
          Write-Host "CSV_FILE=$env:CSV_FILE"
          Write-Host "BBS_BASE_URL=$env:BBS_BASE_URL"

      - name: Validate CSV File & Columns
        shell: pwsh
        run: |
          $csvPath = $env:CSV_FILE
          if (-not (Test-Path $csvPath)) {
            Write-Error "CSV file not found: $csvPath"
            exit 1
          }
          Write-Host "CSV file found: $csvPath"

          $csv = Import-Csv -Path $csvPath
          if (-not $csv -or $csv.Count -eq 0) {
            Write-Error "CSV appears empty: $csvPath"
            exit 1
          }

          $required = @('project-key','repo','url','github_org','github_repo')
          $cols = $csv[0].PSObject.Properties.Name
          $missing = $required | Where-Object { $_ -notin $cols }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing required columns in CSV: {0}" -f ($missing -join ', '))
            exit 1
          }
          Write-Host "✅ CSV structure validation passed"
          Write-Host "Total repositories to validate: $($csv.Count)"

      - name: Run Migration Validation (BBS to GH)
        shell: pwsh
        env:
          GH_PAT:        ${{ secrets.GH_PAT }}
          GH_TOKEN:      ${{ secrets.GH_PAT }}
          BBS_TOKEN:     ${{ secrets.BBS_TOKEN }}
          BBS_AUTH_TYPE: ${{ secrets.BBS_AUTH_TYPE }}
          BBS_USERNAME:  ${{ secrets.BBS_USERNAME }}
          BBS_PASSWORD:  ${{ secrets.BBS_PASSWORD }}
        run: |
          .\scripts\2_migration_validation_bbs.ps1 -CsvPath "$env:CSV_FILE" -BbsBaseUrl "$env:BBS_BASE_URL"

      - name: Upload Validation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-bbs-${{ github.run_number }}
          path: |
            validation-*.txt
            validation-*.json
          retention-days: 30

      - name: Generate Workflow Summary
        if: always()
        shell: pwsh
        run: |
          $summary = @()
          $summary += "## BBS to GH Migration Validation Summary"
          $summary += ""
          $summary += "**Run Number:** ${{ github.run_number }}"
          $summary += "**CSV Path:** $env:CSV_FILE"
          $summary += "**Bitbucket Base URL:** $env:BBS_BASE_URL"
          $summary += ""

          $logFile = Get-ChildItem -Filter "validation-log-*.txt" |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if ($null -ne $logFile) {
            $summary += "### Validation Log Preview"
            $summary += ""
            $summary += '```'
            $summary += (Get-Content $logFile.FullName -Tail 50)
            $summary += '```'
            $summary += ""
            $summary += "📈 Full validation results are in workflow artifacts."
          }

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Append Table Summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "validation-summary.md") {
            $content = Get-Content "validation-summary.md" -Raw
            $header  = @(
              "## Repository Validation Summary",
              "",
              $content
            ) -join "`n"
            $header | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            Write-Host "validation-summary.md not found; skipping summary table."
          }
