name: 0-bbs-repo-inventory

on:
  workflow_dispatch:
    inputs:
      bbs_base_url:
        description: 'Bitbucket Server/Data Center base URL'
        required: true
        type: string
      bbs_project:
        description: 'Optional: scope to a single BBS project key (e.g., WORK). Leave blank for all projects.'
        required: false
        type: string
      # artifact_name:
      #   description: 'Artifact base name'
      #   required: false
      #   default: 'bbs-repos.csv'
      #   type: string

permissions:
  contents: read
  actions: write

jobs:
  generate-inventory:
    name: Generate BBS Inventory & Upload repos.csv
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # No checkout: we do not reference any files from the repository

      - name: Verify GitHub CLI
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "GitHub CLI version:" -ForegroundColor Cyan
          gh --version
          gh auth status

      - name: Install gh-bbs2gh extension
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Installing gh-bbs2gh..." -ForegroundColor Cyan
          gh extension install github/gh-bbs2gh
          Write-Host "`nInstalled extension version:" -ForegroundColor Cyan
          gh bbs2gh --version

      - name: Run gh bbs2gh inventory-report
        id: run_inventory
        shell: pwsh
        env:
          GH_TOKEN:     ${{ secrets.GH_PAT }}        # GitHub PAT (needed by CLI extension)
          BBS_USERNAME: ${{ secrets.BBS_USERNAME }}  # Bitbucket Server admin/super-admin user
          BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}  # Bitbucket Server password
        run: |
          $ErrorActionPreference = 'Stop'

          $bbsUrl   = "${{ inputs.bbs_base_url }}"
          $project  = "${{ inputs.bbs_project }}"
          $minimal  = "${{ inputs.minimal }}"

          # Compose command
          $cmd = "gh bbs2gh inventory-report --bbs-server-url `"$bbsUrl`""
          if ($project -and $project.Trim().Length -gt 0) { $cmd += " --bbs-project `"$project`"" }
          if ($minimal -eq "true") { $cmd += " --minimal" }

          # bbs2gh authenticates to BBS using username/password (per GitHub docs)
          # It reads them from env vars BBS_USERNAME/BBS_PASSWORD
          Write-Host "[INFO] Executing:" -ForegroundColor Cyan
          Write-Host $cmd
          iex $cmd

          # Find the newest repos.csv anywhere under the workspace
          $repoCsv = Get-ChildItem -Path . -Recurse -Filter "repos.csv" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $repoCsv) {
            Write-Error "[ERROR] Could not find repos.csv after inventory-report. Ensure command completed successfully."
          }

          Write-Host "[INFO] Found repos.csv at: $($repoCsv.FullName)" -ForegroundColor Green

          # Output the absolute path for upload step (no copy)
          "repo_csv_path=$((Resolve-Path $repoCsv.FullName).Path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          # Optional preview
          try {
            Write-Host "`n=== repos.csv preview (Top 5 rows) ===" -ForegroundColor Cyan
            Import-Csv $repoCsv.FullName | Select-Object -First 5 | Format-Table -AutoSize
          } catch {
            Write-Host "[WARN] Preview failed (non-CSV or large file). Proceeding with upload." -ForegroundColor Yellow
          }

      # - name: Upload repos.csv artifact (only)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ inputs.artifact_name }}-${{ github.run_number }}
      #     path: ${{ steps.run_inventory.outputs.repo_csv_path }}
      #     retention-days: 30
      #     if-no-files-found: error
      
      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csv reports
          path: |
            *.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $bbsUrl   = "${{ inputs.bbs_base_url }}"
          $project  = "${{ inputs.bbs_project }}"
          $minimal  = "${{ inputs.minimal }}"
          $baseName = "${{ inputs.artifact_name }}-${{ github.run_number }}"

          Write-Host "## BBS Inventory Complete" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "**Command:** gh bbs2gh inventory-report --bbs-server-url $bbsUrl $($project -and ('--bbs-project ' + $project) -or '') $($minimal -eq 'true' ? '--minimal' : '')" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "**Artifact:** \`$baseName\` (contains only \`repos.csv\`)" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "" >> $env:GITHUB_STEP_SUMMARY
          Write-Host "📥 Download **repos.csv**, modify if needed (e.g., add GitHub mapping columns), then use it for migration workflows." >> $env:GITHUB_STEP_SUMMARY
