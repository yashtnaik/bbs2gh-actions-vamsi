name: 0-pr-pipeline-check

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'Path to repos CSV file'
        required: false
        default: 'repos.csv'
      trigger_migration:
        description: 'Automatically trigger migration after successful check?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      bbs_base_url:
        description: 'Bitbucket Server/DC base URL (e.g., https://bitbucket.example.com)'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  readiness-check:
    runs-on: windows-latest
    timeout-minutes: 45
    environment: "PAT tokens"
    outputs:
      check-passed: ${{ steps.check-result.outputs.passed }}
      has-blockers: ${{ steps.check-result.outputs.has-blockers }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Bitbucket Pipeline Readiness Check
        id: run-check
        shell: pwsh
        env:
          # Preferred Bitbucket auth: HTTP access token (Bearer)
          BBS_PAT: ${{ secrets.BBS_PAT }}
          # Fallback: Basic auth
          BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
          BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
          BBS_BASE_URL: ${{ inputs.bbs_base_url }}
        run: |
          Write-Host "==================================================" -ForegroundColor Cyan
          Write-Host " Bitbucket Server/DC Pipeline Readiness Check     " -ForegroundColor Cyan
          Write-Host "==================================================" -ForegroundColor Cyan
          Write-Host ""
          $ErrorActionPreference = 'Continue'
          # Run the PS script from repo
          $output = & .\scripts\0_pr_pipeline_check.ps1 -CsvPath "${{ inputs.csv_path }}" 2>&1
          $output | ForEach-Object { Write-Host $_ }
          # Detect blockers using console markers from the script
          $outputString = $output | Out-String
          $hasBlockers = $outputString -match '\[BLOCKER\]'
          if ($hasBlockers) {
            Write-Host "`n❌ BLOCKERS FOUND - Migration should not proceed" -ForegroundColor Red
            echo "READINESS_CHECK_PASSED=false" >> $env:GITHUB_ENV
            echo "HAS_BLOCKERS=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "`n✅ NO BLOCKERS FOUND - Safe to proceed with migration" -ForegroundColor Green
            echo "READINESS_CHECK_PASSED=true" >> $env:GITHUB_ENV
            echo "HAS_BLOCKERS=false" >> $env:GITHUB_ENV
          }
      - name: Set Check Result Output
        id: check-result
        shell: pwsh
        run: |
          $passed = $env:READINESS_CHECK_PASSED
          $hasBlockers = $env:HAS_BLOCKERS
          echo "passed=$passed" >> $env:GITHUB_OUTPUT
          echo "has-blockers=$hasBlockers" >> $env:GITHUB_OUTPUT
          if ($passed -eq 'false') {
            Write-Host "::warning::Readiness check found blockers. Migration is NOT recommended."
          } else {
            Write-Host "::notice::Readiness check passed! You can proceed with migration."
          }
      - name: Upload precheck outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bbs-precheck-${{ github.run_number }}
          path: bbs_pipeline_validation_output-*.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Generate Readiness Summary
        if: always()
        shell: pwsh
        run: |
          $passed = $env:READINESS_CHECK_PASSED
          $hasBlockers = $env:HAS_BLOCKERS
          $triggerMigration = "${{ inputs.trigger_migration }}"
          $csvPath = "${{ inputs.csv_path }}"
          $bbsUrl = "${{ inputs.bbs_base_url }}"
          # Write summary line-by-line (no here-strings, no backticks)
          Add-Content $env:GITHUB_STEP_SUMMARY '# 🔎 Bitbucket Pipeline Readiness Check Results'
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          if ($passed -eq 'true' -and $hasBlockers -eq 'false') {
            Add-Content $env:GITHUB_STEP_SUMMARY '## Overall Status: 🟢 PASSED'
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY '## Overall Status: 🔴 FAILED'
          }
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          Add-Content $env:GITHUB_STEP_SUMMARY ("For repositories in: ``" + $csvPath + "``")
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          Add-Content $env:GITHUB_STEP_SUMMARY '### Validation Checks Performed'
          Add-Content $env:GITHUB_STEP_SUMMARY '- ✅ Open Pull Requests (state=OPEN, paged)'
          Add-Content $env:GITHUB_STEP_SUMMARY '- ✅ Running Builds on latest default-branch commit (Bitbucket build status)'
          Add-Content $env:GITHUB_STEP_SUMMARY '- ✅ Archived Repositories'
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          if ($passed -eq 'true' -and $hasBlockers -eq 'false') {
            Add-Content $env:GITHUB_STEP_SUMMARY '### Recommendation'
            Add-Content $env:GITHUB_STEP_SUMMARY '**You can safely proceed with the migration.**'
            if ($triggerMigration -eq 'true') {
              Add-Content $env:GITHUB_STEP_SUMMARY ''
              Add-Content $env:GITHUB_STEP_SUMMARY '#### 🚀 Auto-Trigger Enabled'
              Add-Content $env:GITHUB_STEP_SUMMARY 'Migration workflow will be dispatched after this job.'
            }
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY '### Action Required'
            Add-Content $env:GITHUB_STEP_SUMMARY '- Resolve OPEN PRs or pause builds (INPROGRESS).'
            Add-Content $env:GITHUB_STEP_SUMMARY '- Ensure default branch / latest commit are discoverable.'
            Add-Content $env:GITHUB_STEP_SUMMARY '- Re-run this check.'
          }
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          Add-Content $env:GITHUB_STEP_SUMMARY '---'
          Add-Content $env:GITHUB_STEP_SUMMARY ("📅 **Check Date**: " + (Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC'))
          Add-Content $env:GITHUB_STEP_SUMMARY ("📁 **CSV File**: ``" + $csvPath + "``")
          Add-Content $env:GITHUB_STEP_SUMMARY ("🔗 **Bitbucket Base URL**: " + $bbsUrl)
      - name: Fail if Blockers Found (Optional)
        if: env.HAS_BLOCKERS == 'true'
        shell: pwsh
        run: |
          Write-Host "::warning::Blockers found. Workflow continues (soft gate)."
          # Uncomment to hard fail:
          # exit 1
  trigger-migration:
    needs: readiness-check
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Migration Workflow (only when passed & no blockers)
        if: ${{ github.event.inputs.trigger_migration == 'true' && needs['readiness-check'].outputs['check-passed'] == 'true' && needs['readiness-check'].outputs['has-blockers'] == 'false' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            console.log('✅ Readiness check passed! Triggering migration workflow...');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '1-migration.yml',
              ref: 'main',
              inputs: {
                csv_path: '${{ inputs.csv_path }}',
                max_concurrent: '3'
              }
            });
            console.log('🚀 Migration workflow triggered successfully!');
