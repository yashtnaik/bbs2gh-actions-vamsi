name: 0-pr-pipeline-check

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'Path to repos CSV file'
        required: false
        default: 'repos.csv'
      trigger_migration:
        description: 'Automatically trigger migration after successful check?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      bbs_base_url:
        description: 'Bitbucket Server/DC base URL'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  readiness-check:
    runs-on: windows-latest
    timeout-minutes: 45
    environment: PAT tokens
    outputs:
      check-passed: ${{ steps.check-result.outputs.passed }}
      has-blockers: ${{ steps.check-result.outputs.has-blockers }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Bitbucket Pipeline Readiness Check
        id: run-check
        shell: pwsh
        env:
          # Preferred Bitbucket auth: HTTP access token (Bearer)
          BBS_PAT: ${{ secrets.BBS_PAT }}
          # Fallback: Basic auth
          BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
          BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
          BBS_BASE_URL: ${{ inputs.bbs_base_url }}
        run: |
          Write-Host "==================================================" -ForegroundColor Cyan
          Write-Host " Bitbucket Server/DC Pipeline Readiness Check     " -ForegroundColor Cyan
          Write-Host "==================================================" -ForegroundColor Cyan
          Write-Host ""

          $ErrorActionPreference = 'Continue'

          # Capture the output (incl. errors) from the PS script
          $output = & .\scripts\0_pr_pipeline_check.ps1 -CsvPath "${{ inputs.csv_path }}" 2>&1
          $output | ForEach-Object { Write-Host $_ }

          # Detect blockers using console markers from the script
          $outputString = $output | Out-String
          $hasBlockers = $outputString -match '\[BLOCKER\]'

          if ($hasBlockers) {
            Write-Host "`n❌ BLOCKERS FOUND - Migration should not proceed" -ForegroundColor Red
            echo "READINESS_CHECK_PASSED=false" >> $env:GITHUB_ENV
            echo "HAS_BLOCKERS=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "`n✅ NO BLOCKERS FOUND - Safe to proceed with migration" -ForegroundColor Green
            echo "READINESS_CHECK_PASSED=true" >> $env:GITHUB_ENV
            echo "HAS_BLOCKERS=false" >> $env:GITHUB_ENV
          }

      - name: Set Check Result Output
        id: check-result
        shell: pwsh
        run: |
          $passed = $env:READINESS_CHECK_PASSED
          $hasBlockers = $env:HAS_BLOCKERS
          echo "passed=$passed" >> $env:GITHUB_OUTPUT
          echo "has-blockers=$hasBlockers" >> $env:GITHUB_OUTPUT
          if ($passed -eq 'false') {
            Write-Host "::warning::Readiness check found blockers. Migration is NOT recommended."
          } else {
            Write-Host "::notice::Readiness check passed! You can proceed with migration."
          }

      - name: Generate Readiness Summary
        if: always()
        shell: pwsh
        run: |
          $passed = $env:READINESS_CHECK_PASSED
          $hasBlockers = $env:HAS_BLOCKERS
          $triggerMigration = "${{ inputs.trigger_migration }}"
          $csvPath = "${{ inputs.csv_path }}"

          $statusIcon = if ($passed -eq 'true' -and $hasBlockers -eq 'false') { "✅" } else { "❌" }
          $statusText = if ($passed -eq 'true' -and $hasBlockers -eq 'false') { "PASSED" } else { "FAILED" }
          $statusColor = if ($passed -eq 'true' -and $hasBlockers -eq 'false') { "🟢" } else { "🔴" }
          $recommendation = if ($passed -eq 'true' -and $hasBlockers -eq 'false') {
            "**You can safely proceed with the migration.**"
          } else {
            "**Migration is NOT recommended. Please resolve the blockers first.**"
          }

          $summary = @"
# 🔎 Bitbucket Pipeline Readiness Check Results
## Overall Status: $statusColor $statusText
The readiness check has been completed for repositories in: ``$csvPath``

### Validation Checks Performed:
- ✅ **Open Pull Requests**: Detected via `/pull-requests?state=OPEN` (paged).
- ✅ **Running Builds** (pipeline proxy): Detected via commit build status on latest default-branch commit.
- ✅ **Archived Repositories**: Skipped/flagged if found.

### Recommendation
$recommendation
"@

          if ($passed -eq 'true') {
            $summary += @"
#### ✅ Ready to Migrate
1. **Manual Trigger**: Run your migration workflow.
2. **Review CSV**: Ensure ``$csvPath`` has correct GitHub mapping (`github_org`, `github_repo`, `gh_repo_visibility`).
"@
            if ($triggerMigration -eq 'true') {
              $summary += @"
#### 🚀 Auto-Trigger Enabled
The migration workflow will be automatically triggered after this check completes.
"@
            }
          } else {
            $summary += @"
#### ❌ Action Required
1. **Review Blockers**: Check the console and the output CSV for specific issues.
2. **Resolve Issues**:
   - Close/merge or pause **OPEN PRs**.
   - Wait for **INPROGRESS** builds to finish (Bitbucket build status integration).
3. **Re-run Check** after resolving issues.
"@
          }

          $summary += @"
---
📅 **Check Date**: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
📁 **CSV File**: ``$csvPath``
🔗 **Bitbucket Base URL**: `${{ inputs.bbs_base_url }}`
"@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Fail if Blockers Found (Optional)
        if: env.HAS_BLOCKERS == 'true'
        shell: pwsh
        run: |
          Write-Host "::warning::Readiness check completed, but blockers were found. Workflow will not fail, just warns."
          # If you want a hard gate, uncomment the next line
          # exit 1

  trigger-migration:
    needs: readiness-check
    if: >
      github.event.inputs.trigger_migration == 'true' &&
      needs.readiness-check.outputs.check-passed == 'true' &&
      needs.readiness-check.outputs.has-blockers == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Migration Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            console.log('✅ Readiness check passed! Triggering migration workflow...');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '1-migration.yml',
              ref: 'main',
              inputs: {
                csv_path: '${{ inputs.csv_path }}',
                max_concurrent: '3'
              }
            });
            console.log('🚀 Migration workflow triggered successfully!');
            console.log('Go to Actions tab to monitor the migration progress.');
