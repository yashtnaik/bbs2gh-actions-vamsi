name: 1-migration

on:
  workflow_dispatch:
    inputs:
      max_concurrent:
        description: 'Maximum concurrent migrations (1-5)'
        required: false
        default: '3'
        type: choice
        options: ['1','2','3','4','5']
      csv_path:
        description: 'Path to repos CSV file'
        required: false
        default: 'repos.csv'
        type: string
      bbs_base_url:
        description: 'Bitbucket Server/DC base URL (e.g., https://bitbucket.example.com)'
        required: true
        type: string
      trigger_validation:
        description: 'Automatically trigger validation after migration'
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      max_concurrent:
        description: 'Maximum concurrent migrations (1-5)'
        required: false
        default: '3'
        type: string
      csv_path:
        description: 'Path to repos CSV file'
        required: false
        default: 'repos.csv'
        type: string
      bbs_base_url:
        description: 'Bitbucket Server/DC base URL'
        required: true
        type: string
      trigger_validation:
        description: 'Automatically trigger validation after migration'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  migrate-repositories:
    runs-on: windows-latest
    timeout-minutes: 360
    environment: "PAT tokens"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          Write-Host "GitHub CLI Version:" -ForegroundColor Cyan
          gh --version
          Write-Host "`nAuthentication Status:" -ForegroundColor Cyan
          gh auth status

      - name: Install BBS2GH Extension
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          Write-Host "Installing gh-bbs2gh extension..." -ForegroundColor Cyan
          gh extension install github/gh-bbs2gh
          Write-Host "`nVerifying installation:" -ForegroundColor Cyan
          gh bbs2gh --version

      - name: Validate CSV File
        shell: pwsh
        run: |
          $csvPath = "${{ inputs.csv_path }}"
          if (-not (Test-Path $csvPath)) {
            Write-Host "[ERROR] CSV file not found: $csvPath" -ForegroundColor Red
            exit 1
          }

          $repos = Import-Csv -Path $csvPath
          if (-not $repos -or $repos.Count -eq 0) {
            Write-Host "[ERROR] CSV is empty: $csvPath" -ForegroundColor Red
            exit 1
          }

          Write-Host "[INFO] Found $($repos.Count) repositories to migrate" -ForegroundColor Green

          # Required columns for BBS -> GH mapping
          $requiredColumns = @('project-key','project-name','repo','github_org','github_repo','gh_repo_visibility')
          $missingColumns = $requiredColumns | Where-Object { $_ -notin $repos[0].PSObject.Properties.Name }
          if ($missingColumns) {
            Write-Host "[ERROR] Missing required columns: $($missingColumns -join ', ')" -ForegroundColor Red
            exit 1
          }

          # Validate visibility values (public|private|internal)
          $badVis = $repos | Where-Object { $_.'gh_repo_visibility' -notmatch '^(public|private|internal)$' }
          if ($badVis) {
            Write-Host "[ERROR] Invalid gh_repo_visibility values found. Use: public|private|internal" -ForegroundColor Red
            exit 1
          }

          Write-Host "[SUCCESS] CSV validation passed" -ForegroundColor Green

      - name: Run Concurrent Migration
        shell: pwsh
        env:
          GH_PAT:       ${{ secrets.GH_PAT }}
          GH_TOKEN:     ${{ secrets.GH_PAT }}
          BBS_USERNAME: ${{ secrets.BBS_USERNAME }}
          BBS_PASSWORD: ${{ secrets.BBS_PASSWORD }}
          BBS_BASE_URL: ${{ inputs.bbs_base_url }}
        run: |
          # Execute migration script with parameters
          .\scripts\1_migration.ps1 `
            -MaxConcurrent ${{ inputs.max_concurrent }} `
            -CsvPath "${{ inputs.csv_path }}"

      - name: Generate Workflow Summary
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $outputCsv = Get-ChildItem -Filter "repo_migration_output-*.csv" |
                       Sort-Object LastWriteTime -Descending |
                       Select-Object -First 1

          if ($outputCsv) {
            $results = Import-Csv -Path $outputCsv.FullName
            $total   = $results.Count
            $success = ($results | Where-Object { $_.Migration_Status -eq 'Success' }).Count
            $failed  = ($results | Where-Object { $_.Migration_Status -eq 'Failure' }).Count
            $pending = ($results | Where-Object { $_.Migration_Status -eq 'Pending' }).Count
            $successRate = if ($total -gt 0) { [math]::Round(($success / $total) * 100, 2) } else { 0 }

            Add-Content $env:GITHUB_STEP_SUMMARY '# 🚀 Migration Execution Summary (Bitbucket Server → GitHub)'
            Add-Content $env:GITHUB_STEP_SUMMARY ''
            Add-Content $env:GITHUB_STEP_SUMMARY '## 📊 Overall Statistics'
            Add-Content $env:GITHUB_STEP_SUMMARY ("- **Total Repositories**: " + $total)
            Add-Content $env:GITHUB_STEP_SUMMARY ("- **Successfully Migrated**: ✅ " + $success)
            Add-Content $env:GITHUB_STEP_SUMMARY ("- **Failed Migrations**: ❌ " + $failed)
            Add-Content $env:GITHUB_STEP_SUMMARY ("- **Pending/Not Started**: ⏳ " + $pending)
            Add-Content $env:GITHUB_STEP_SUMMARY ("- **Success Rate**: " + $successRate + "%")
            Add-Content $env:GITHUB_STEP_SUMMARY ("- **Concurrent Jobs**: " + "${{ inputs.max_concurrent }}")
            Add-Content $env:GITHUB_STEP_SUMMARY ''
            Add-Content $env:GITHUB_STEP_SUMMARY '## 📁 Artifacts'
            Add-Content $env:GITHUB_STEP_SUMMARY ("- Output CSV: ``" + $outputCsv.Name + "``")

            if ($failed -gt 0) {
              Add-Content $env:GITHUB_STEP_SUMMARY ''
              Add-Content $env:GITHUB_STEP_SUMMARY '## ❌ Failed Migrations'
              Add-Content $env:GITHUB_STEP_SUMMARY ''
              Add-Content $env:GITHUB_STEP_SUMMARY '| Repository | BBS Project | GitHub Org | Log File |'
              Add-Content $env:GITHUB_STEP_SUMMARY '|------------|-------------|------------|----------|'
              ($results | Where-Object { $_.Migration_Status -eq 'Failure' }) | ForEach-Object {
                Add-Content $env:GITHUB_STEP_SUMMARY ("| " + $_.repo + " | " + $_.'project-key' + " | " + $_.github_org + " | " + $_.Log_File + " |")
              }
            }

            if ($success -gt 0) {
              Add-Content $env:GITHUB_STEP_SUMMARY ''
              Add-Content $env:GITHUB_STEP_SUMMARY '## ✅ Successfully Migrated Repositories'
              Add-Content $env:GITHUB_STEP_SUMMARY ("Total: " + $success + " repositories migrated successfully")
              Add-Content $env:GITHUB_STEP_SUMMARY ''
              Add-Content $env:GITHUB_STEP_SUMMARY '| Repository | GitHub URL |'
              Add-Content $env:GITHUB_STEP_SUMMARY '|------------|------------|'
              ($results | Where-Object { $_.Migration_Status -eq 'Success' } | Select-Object -First 10) | ForEach-Object {
                $ghUrl = "https://github.com/" + $_.github_org + "/" + $_.github_repo
                Add-Content $env:GITHUB_STEP_SUMMARY ("| " + $_.repo + " | " + $ghUrl + " |")
              }
              $more = $success - 10
              if ($more -gt 0) {
                Add-Content $env:GITHUB_STEP_SUMMARY ("`n*... and " + $more + " more*")
              }
            }
          } else {
            Write-Host "[WARNING] No output CSV found" -ForegroundColor Yellow
          }

      - name: Upload Migration Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-logs-${{ github.run_id }}
          path: migration-*.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Output CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-output-csv-${{ github.run_id }}
          path: repo_migration_output-*.csv
          retention-days: 90
          if-no-files-found: error

      - name: Check for Failures
        if: always()
        shell: pwsh
        run: |
          $outputCsv = Get-ChildItem -Filter "repo_migration_output-*.csv" |
                       Sort-Object LastWriteTime -Descending |
                       Select-Object -First 1
          if ($outputCsv) {
            $results = Import-Csv -Path $outputCsv.FullName
            $failed = ($results | Where-Object { $_.Migration_Status -eq 'Failure' }).Count
            if ($failed -gt 0) {
              Write-Host "::warning::$failed repositories failed to migrate. Check the logs for details." -ForegroundColor Yellow
            } else {
              Write-Host "::notice::All migrations completed successfully!" -ForegroundColor Green
            }
          }

  trigger-validation:
    name: Trigger Migration Validation
    needs: migrate-repositories
    # gate on both dispatch and workflow_call inputs (boolean true)
    if: ${{ github.event.inputs.trigger_validation == true || inputs.trigger_validation == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Validation Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '2-migration-validation.yml',
              ref: context.ref,
              inputs: {
                csv_path: '${{ inputs.csv_path }}'
              }
            });
            console.log('✅ Migration validation workflow triggered successfully');
